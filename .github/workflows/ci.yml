# ============================================================
# ClutchG PC Optimizer — CI Pipeline
# GitHub Actions workflow for automated testing
# ============================================================
#
# Runs unit + integration tests on windows-latest.
# E2E tests are EXCLUDED — they require a desktop session
# and CustomTkinter GUI display that CI runners cannot provide.
# Admin-only tests are also excluded.

name: CI — Unit & Integration Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'clutchg/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'clutchg/**'
      - '.github/workflows/**'

jobs:
  test:
    name: Run Tests (Windows)
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      # ---- Checkout ----
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---- Python setup ----
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            clutchg/requirements.txt
            clutchg/requirements-test.txt

      # ---- Install dependencies ----
      - name: Install runtime dependencies
        run: pip install -r clutchg/requirements.txt

      - name: Install test dependencies
        run: pip install -r clutchg/requirements-test.txt

      # ---- Unit Tests ----
      - name: Run unit tests
        working-directory: clutchg
        run: >
          pytest tests/unit -m unit
          -v
          --tb=short
          --cov=src
          --cov-report=term-missing
          --cov-report=html:htmlcov
          --cov-report=xml:coverage.xml
          --junitxml=test-results/unit-results.xml

      # ---- Integration Tests ----
      - name: Run integration tests
        working-directory: clutchg
        run: >
          pytest tests/integration -m integration
          -v
          --tb=short
          --junitxml=test-results/integration-results.xml

      # ---- Upload coverage report ----
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: clutchg/htmlcov/
          retention-days: 14

      # ---- Upload test results ----
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: clutchg/test-results/
          retention-days: 14

      # ---- Syntax Check ----
      - name: Check Python syntax
        run: python -m compileall clutchg/src

      # ---- Coverage summary in PR ----
      - name: Coverage summary
        if: always()
        working-directory: clutchg
        run: |
          echo "## Test Coverage Summary" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          python -m pytest tests/unit -m unit --cov=src --cov-report=term --no-header -q 2>&1 | Select-String -Pattern "TOTAL|Name|---" | ForEach-Object { echo $_.Line } >> $env:GITHUB_STEP_SUMMARY
