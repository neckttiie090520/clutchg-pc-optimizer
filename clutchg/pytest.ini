[pytest]
# Pytest configuration for ClutchG UI Automation

# Test discovery paths
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov

# Test markers for categorization
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (business logic workflows)
    e2e: End-to-end UI tests (full application)
    slow: Tests that take >10 seconds
    admin: Tests requiring admin privileges
    requires_network: Tests requiring network access

# Coverage configuration lives in .coveragerc
